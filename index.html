<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Duelo Espacial - Multiplataforma & Supervivencia</title>
    <style>
        :root { --bg: #06060f; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:manipulation; }
        body { background:var(--bg); display:flex; align-items:center; justify-content:center; height:100vh; height:100dvh; width:100vw; width:100dvw; overflow:hidden; font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; position:fixed; top:0; left:0; }
        #gameContainer { position:relative; width:100vw; width:100dvw; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; }
        canvas { display:block; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; }
        #uiOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .menu-panel { pointer-events:auto; background:rgba(10,10,30,0.92); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.15); border-radius:24px; padding:24px 20px; display:flex; flex-direction:column; align-items:center; gap:14px; color:#fff; text-align:center; max-width:400px; width:92%; box-shadow:0 20px 50px rgba(0,0,0,0.6); }
        .menu-panel h2 { font-size:1.8rem; font-weight:700; letter-spacing:1px; background:linear-gradient(135deg,#00d4ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .menu-panel h3 { font-size:1.1rem; color:#aaa; }
        .btn { pointer-events:auto; padding:12px 28px; border-radius:50px; border:none; font-weight:700; font-size:0.95rem; letter-spacing:0.8px; cursor:pointer; color:#fff; background:linear-gradient(135deg,#1e3a5f,#0f172a); box-shadow:0 4px 15px rgba(0,150,255,0.3); transition:all 0.2s; width:100%; max-width:260px; text-transform:uppercase; }
        .btn:active { transform:scale(0.96); box-shadow:0 2px 8px rgba(0,150,255,0.5); }
        .btn.primary { background:linear-gradient(135deg,#00a6ff,#6d28d9); box-shadow:0 4px 20px rgba(0,166,255,0.5); }
        .btn.small { padding:8px 18px; font-size:0.8rem; max-width:140px; }
        .btn:disabled { opacity:0.4; pointer-events:none; }
        .ship-select { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; width:100%; }
        .ship-card { background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.1); border-radius:16px; padding:12px 8px; width:80px; text-align:center; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:4px; }
        .ship-card.selected { border-color:#00d4ff; box-shadow:0 0 15px rgba(0,212,255,0.5); background:rgba(0,212,255,0.15); }
        .ship-card.locked { opacity:0.5; cursor:not-allowed; border-style:dashed; }
        .ship-preview { width:40px; height:32px; border-radius:6px; }
        .currency-display { font-size:1.1rem; font-weight:700; color:#ffd700; display:flex; align-items:center; gap:4px; justify-content:center; }
        #rotateMessage { display:none; position:absolute; z-index:10; text-align:center; color:#ffffffcc; pointer-events:none; flex-direction:column; align-items:center; gap:20px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiOverlay"></div>
        <div id="rotateMessage"><div style="font-size:60px;">📱</div><div style="font-size:18px;font-weight:600;">Gira tu dispositivo</div><div style="font-size:13px;opacity:0.6;">Modo horizontal para jugar</div></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('gameContainer');
            const uiOverlay = document.getElementById('uiOverlay');
            const rotateMsg = document.getElementById('rotateMessage');

            // ────────────────────────────────────────
            // CONFIGURACIÓN DE NAVES (TIENDA)
            // ────────────────────────────────────────
            const SHIP_DEFS = {
                basic: { id:'basic', name:'Cazador', color:'#00d4ff', glow:'#00e5ff', speed:1.0, fireRate:450, projectiles:1, price:0, desc:'Equilibrado' },
                rapid: { id:'rapid', name:'Veloz', color:'#a855f7', glow:'#c084fc', speed:1.4, fireRate:280, projectiles:1, price:300, desc:'Rápido y ágil' },
                tank: { id:'tank', name:'Tanque', color:'#f97316', glow:'#fb923c', speed:0.65, fireRate:700, projectiles:3, price:500, desc:'Triple disparo' },
                sniper: { id:'sniper', name:'Francotirador', color:'#e11d48', glow:'#f43f5e', speed:0.85, fireRate:900, projectiles:1, price:400, desc:'Proyectil potente' },
                shield: { id:'shield', name:'Escudado', color:'#22c55e', glow:'#4ade80', speed:0.9, fireRate:500, projectiles:1, price:600, desc:'Escudo innato' }
            };

            // ────────────────────────────────────────
            // PALETA DE FONDOS BELLOS Y VARIADOS
            // ────────────────────────────────────────
            const BACKGROUNDS = [
                { name: "Nebulosa Orión", deep: "#0d0d2b", dark: "#06060f", neb1: "rgba(120,40,255,0.14)", neb2: "rgba(0,180,255,0.08)" },
                { name: "Sector de Fuego", deep: "#2b0d0d", dark: "#0f0606", neb1: "rgba(255,60,0,0.14)", neb2: "rgba(255,160,0,0.08)" },
                { name: "Abismo Cian", deep: "#0d2b2b", dark: "#060f0f", neb1: "rgba(0,255,200,0.14)", neb2: "rgba(0,100,255,0.08)" },
                { name: "Vacío Purpúreo", deep: "#230d2b", dark: "#0c060f", neb1: "rgba(236,72,153,0.14)", neb2: "rgba(139,92,246,0.08)" },
                { name: "Núcleo Esmeralda", deep: "#0d2b14", dark: "#060f08", neb1: "rgba(34,197,94,0.14)", neb2: "rgba(234,179,8,0.08)" }
            ];

            // ────────────────────────────────────────
            // ESTADO GLOBAL ELÁSTICO
            // ────────────────────────────────────────
            let gameState = 'menu';
            let gameMode = '1vs1'; // '1vs1' o 'survival'
            let isLandscape = true;
            let canvasW, canvasH;
            let player1, player2;
            let projectiles = [];
            let particles = [];
            let powerUps = [];
            let obstacles = [];
            let stars = [];
            let floatingTexts = [];
            let cinematicFlash = 0;
            let powerUpTimer = 0;
            let obstacleTimer = 0;
            let winnerPlayer = null;
            let gameOverTimer = 0;
            let shakeAmount = 0; 
            let cameraZoom = 1;
            let activeTouches = {};
            let keys = {}; // Registro de teclado para PC

            // Persistencia del Perfil y Corazones
            let currencyP1 = 0, currencyP2 = 0;
            let equippedShipP1 = 'basic', equippedShipP2 = 'basic';
            let unlockedShipsP1 = new Set(['basic']), unlockedShipsP2 = new Set(['basic']);
            let livesP1 = 3, livesP2 = 3; // ❤️ Globales del Modo 1vs1

            // Estado específico de Supervivencia
            let currentWave = 1;
            let survivalHearts = 3; // ❤️ Globales del Modo Supervivencia
            let enemiesLeftToKill = 0;
            let currentBgIndex = 0;
            let isWarping = false; // Animación de cambio de galaxia
            let warpTimer = 0;
            const WARP_DURATION = 2.2;

            // ────────────────────────────────────────
            // AUDIO SINTETIZADO
            // ────────────────────────────────────────
            let audioCtx = null;
            function initAudio() { if(!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) { audioCtx=null; } } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }
            function playSound(f,t,d,v=0.06,g=null) { if(!audioCtx) return; try { const n=audioCtx.currentTime; const o=audioCtx.createOscillator(); const gn=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f,n); if(g) o.frequency.linearRampToValueAtTime(g,n+d); gn.gain.setValueAtTime(v,n); gn.gain.exponentialRampToValueAtTime(0.001,n+d); o.connect(gn); gn.connect(audioCtx.destination); o.start(n); o.stop(n+d); } catch(e) {} }
            function sfxShoot() { playSound(800,'square',0.07,0.04,400); }
            function sfxHit() { playSound(55,'sawtooth',0.12,0.08,25); playSound(180,'triangle',0.05,0.05); }
            function sfxPowerUp() { playSound(500,'sine',0.08,0.15,1200); playSound(700,'sine',0.06,0.12,1400); }
            function sfxWin() { playSound(523,'square',0.08,0.08); setTimeout(()=>playSound(659,'square',0.08,0.08),100); setTimeout(()=>playSound(784,'square',0.1,0.15),200); }
            function sfxBuy() { playSound(600,'sine',0.06,0.1,900); }
            function vibrate(p) { if(navigator.vibrate) try{navigator.vibrate(p);}catch(e){} }

            // ────────────────────────────────────────
            // PERSISTENCIA LOCAL
            // ────────────────────────────────────────
            function saveData() { try { localStorage.setItem('spaceDuelDataV3', JSON.stringify({ currencyP1,currencyP2,equippedShipP1,equippedShipP2,unlockedP1:Array.from(unlockedShipsP1),unlockedP2:Array.from(unlockedShipsP2),livesP1,livesP2 })); } catch(e) {} }
            function loadData() { try { const r=localStorage.getItem('spaceDuelDataV3'); if(r) { const d=JSON.parse(r); currencyP1=d.currencyP1||0; currencyP2=d.currencyP2||0; equippedShipP1=d.equippedShipP1||'basic'; equippedShipP2=d.equippedShipP2||'basic'; unlockedShipsP1=new Set(d.unlockedP1||['basic']); unlockedShipsP2=new Set(d.unlockedP2||['basic']); livesP1=d.livesP1!==undefined?d.livesP1:3; livesP2=d.livesP2!==undefined?d.livesP2:3; } } catch(e) {} }

            // ────────────────────────────────────────
            // CONTROLADORES DE TECLADO (PC)
            // ────────────────────────────────────────
            window.addEventListener('keydown', (e) => { keys[e.code] = true; initAudio(); });
            window.addEventListener('keyup', (e) => { keys[e.code] = false; });

            // ────────────────────────────────────────
            // CLASES ESENCIALES
            // ────────────────────────────────────────
            class FloatingText {
                constructor(x,y,text,color,life=1.2) { this.x=x; this.y=y; this.text=text; this.color=color; this.life=life; this.maxLife=life; }
                update(dt) { this.life-=dt; this.y-=40*dt; }
                get alive() { return this.life>0; }
                draw(ctx) { const a=this.life/this.maxLife; ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.textAlign='center'; ctx.fillStyle=this.color.replace('1)',`${a})`).replace('rgb','rgba'); ctx.shadowBlur=10; ctx.shadowColor=this.color; ctx.fillText(this.text,this.x,this.y); ctx.shadowBlur=0; }
            }

            class Player {
                constructor(id,x,y,shipDef) {
                    this.id=id; this.x=x; this.y=y; this.baseX=x; this.baseY=y; this.shipDef=shipDef;
                    this.width=44; this.height=34; this.color=shipDef.color; this.glowColor=shipDef.glow;
                    this.score=0; this.shootCooldown=0; this.alive=true; this.hitFlash=0;
                    this.shieldActive=(shipDef.id==='shield'); this.shieldHitsLeft=shipDef.id==='shield'?1:0;
                    this.targetY=y; this.targetX=x; this.isTouching=false;
                    this.buffTimer=0; this.buffType=null;
                    this.tempFireRate=null; this.tempProjectiles=null;
                    this.collectFlash=0;
                }
                reset() {
                    this.x=this.baseX; this.y=this.baseY; this.targetX=this.baseX; this.targetY=this.baseY;
                    this.score=0; this.shootCooldown=0; this.alive=true; this.hitFlash=0;
                    const def = SHIP_DEFS[this.id===1?equippedShipP1:equippedShipP2] || SHIP_DEFS['basic'];
                    this.shipDef=def; this.color=def.color; this.glowColor=def.glow;
                    this.shieldActive=(def.id==='shield'); this.shieldHitsLeft=def.id==='shield'?1:0;
                    this.isTouching=false; this.buffTimer=0; this.buffType=null;
                    this.tempFireRate=null; this.tempProjectiles=null; this.collectFlash=0;
                }
                getShootCooldown() { return this.tempFireRate ?? this.shipDef.fireRate; }
                getProjectileCount() { return this.tempProjectiles ?? this.shipDef.projectiles; }
                getSpeed() { return this.shipDef.speed; }

                applyBuff(type) {
                    this.buffType=type; this.buffTimer=6; this.collectFlash=0.4;
                    if(type==='rapid') { this.tempFireRate=150; this.tempProjectiles=null; }
                    else if(type==='triple') { this.tempProjectiles=3; this.tempFireRate=null; }
                    else if(type==='shield') { this.shieldActive=true; this.shieldHitsLeft=2; this.tempFireRate=null; this.tempProjectiles=null; }
                }
                clearBuff() { this.buffTimer=0; this.buffType=null; this.tempFireRate=null; this.tempProjectiles=null; }
                updateBuff(dt) { if(this.buffTimer>0) { this.buffTimer-=dt; if(this.buffTimer<=0) this.clearBuff(); } if(this.collectFlash>0) this.collectFlash-=dt; }
                handleHit() { if(this.shieldActive && this.shieldHitsLeft>0) { this.shieldHitsLeft--; if(this.shieldHitsLeft<=0) this.shieldActive=false; return false; } this.hitFlash=0.25; return true; }
                draw(ctx,isLandscape) {
                    ctx.save();
                    const flash = this.hitFlash>0?Math.sin(this.hitFlash*40)*0.6:0;
                    const cflash = this.collectFlash>0?Math.sin(this.collectFlash*20)*0.5:0;
                    const alpha = 1-Math.max(0,flash)+Math.max(0,cflash)*0.3;
                    if(this.shieldActive) {
                        ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(this.width,this.height)*0.85,0,Math.PI*2);
                        ctx.strokeStyle=`rgba(100,255,150,${0.7+Math.sin(Date.now()*0.015)*0.3})`; ctx.lineWidth=4;
                        ctx.shadowColor='#22c55e'; ctx.shadowBlur=22; ctx.stroke(); ctx.shadowBlur=0; ctx.lineWidth=1;
                    }
                    if(this.buffTimer>0 && this.buffType) {
                        const buffGlow = this.buffType==='rapid'?'#ffdd00':this.buffType==='triple'?'#00ff88':'#ff8800';
                        ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(this.width,this.height)*0.9,0,Math.PI*2);
                        ctx.strokeStyle=buffGlow; ctx.lineWidth=2; ctx.shadowColor=buffGlow; ctx.shadowBlur=14;
                        ctx.globalAlpha=0.5+Math.sin(Date.now()*0.02)*0.3; ctx.stroke(); ctx.shadowBlur=0; ctx.lineWidth=1; ctx.globalAlpha=1;
                    }
                    ctx.globalAlpha=Math.min(1.2,alpha);
                    const w=this.width/2, h=this.height/2;
                    ctx.beginPath();
                    if(isLandscape) { const d=this.id===1?1:-1; ctx.moveTo(this.x+d*w,this.y); ctx.lineTo(this.x-d*w*0.6,this.y-h); ctx.lineTo(this.x-d*w*0.3,this.y); ctx.lineTo(this.x-d*w*0.6,this.y+h); }
                    else { const d=this.id===1?1:-1; ctx.moveTo(this.x,this.y+d*h); ctx.lineTo(this.x-w,this.y-d*h*0.6); ctx.lineTo(this.x,this.y-d*h*0.3); ctx.lineTo(this.x+w,this.y-d*h*0.6); }
                    ctx.closePath();
                    const grad=ctx.createLinearGradient(this.x-w,this.y-h,this.x+w,this.y+h); grad.addColorStop(0,this.color); grad.addColorStop(1,this.glowColor);
                    ctx.fillStyle=grad; ctx.fill();
                    ctx.strokeStyle=this.glowColor; ctx.lineWidth=2; ctx.shadowColor=this.glowColor; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0;
                    ctx.beginPath(); ctx.arc(this.x,this.y,w*0.28,0,Math.PI*2); ctx.fillStyle='#ffffffcc'; ctx.fill();
                    ctx.beginPath(); ctx.arc(this.x-(this.id===1?-w*0.7:w*0.7),this.y,5+Math.sin(Date.now()*0.02)*2,0,Math.PI*2); ctx.fillStyle='rgba(255,180,50,0.8)'; ctx.shadowBlur=15; ctx.fill();
                    if(this.buffTimer>0) {
                        const icon = this.buffType==='rapid'?'⚡':this.buffType==='triple'?'💥':'🛡';
                        ctx.font='22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
                        ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.fillText(icon, this.x, this.y - this.height/2 - 10);
                        ctx.shadowBlur=0;
                    }
                    ctx.globalAlpha=1; ctx.restore();
                }
            }

            class Projectile {
                constructor(x,y,vx,vy,ownerId,color,isSniper=false) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.ownerId=ownerId; this.color=color; this.radius=isSniper?6:4; this.alive=true; this.isSniper=isSniper; }
                update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; if(this.x<-60||this.x>canvasW+60||this.y<-60||this.y>canvasH+60) this.alive=false; }
                draw(ctx) { ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius); g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,this.color); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.shadowColor=this.color; ctx.shadowBlur=this.isSniper?18:10; ctx.fill(); ctx.shadowBlur=0; }
            }

            class Particle {
                constructor(x,y,vx,vy,color,life) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.color=color; this.life=life; this.maxLife=life; }
                update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; this.vx*=0.94; this.vy*=0.94; }
                get alive() { return this.life>0; }
                draw(ctx) { const a=this.life/this.maxLife; ctx.beginPath(); ctx.arc(this.x,this.y,(2+Math.random()*2.5)*a,0,Math.PI*2); ctx.fillStyle=this.color.replace('1)',`${a})`).replace('rgb','rgba'); ctx.fill(); }
            }

            class PowerUp {
                constructor(x,y,type) { this.x=x; this.y=y; this.type=type; this.radius=22; this.life=9; this.pulse=0; this.collected=false; this.collectTimer=0; }
                get color() { return {'rapid':'#ffdd00','triple':'#00ff88','shield':'#ff8800'}[this.type]||'#fff'; }
                get icon() { return {'rapid':'⚡','triple':'💥','shield':'🛡'}[this.type]||'?'; }
                get label() { return {'rapid':'RÁPIDO','triple':'TRIPLE','shield':'ESCUDO'}[this.type]||''; }
                update(dt) { if(!this.collected) this.life-=dt; else this.collectTimer+=dt; this.pulse+=dt*4; }
                get alive() { return (this.life>0 && !this.collected) || (this.collected && this.collectTimer<0.5); }
                draw(ctx) {
                    if(this.collected) {
                        const a2=1-this.collectTimer/0.5; const r2=this.radius*(1+this.collectTimer*6);
                        ctx.beginPath(); ctx.arc(this.x,this.y,r2,0,Math.PI*2);
                        ctx.strokeStyle=this.color.replace('1)',`${a2})`).replace('rgb','rgba'); ctx.lineWidth=4; ctx.stroke();
                        return;
                    }
                    const s=1+Math.sin(this.pulse)*0.25, a=Math.min(1,this.life*1.5), r=this.radius*s;
                    ctx.beginPath(); ctx.arc(this.x,this.y,r*1.8,0,Math.PI*2); const gg=ctx.createRadialGradient(this.x,this.y,r*0.3,this.x,this.y,r*1.8); gg.addColorStop(0,this.color+'cc'); gg.addColorStop(1,'transparent'); ctx.fillStyle=gg; ctx.fill();
                    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2); const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r); g.addColorStop(0,'#ffffff'); g.addColorStop(0.45,this.color); g.addColorStop(1,this.color+'44'); ctx.fillStyle=g; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1;
                    ctx.fillStyle='#000'; ctx.font=`bold ${r*1.0}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.icon,this.x,this.y);
                }
            }

            class Obstacle {
                constructor(x,y,radius,vx=0,vy=0) { this.x=x; this.y=y; this.radius=radius; this.life=11+Math.random()*9; this.vx=vx; this.vy=vy; }
                update(dt) { this.life-=dt; this.x+=this.vx*dt; this.y+=this.vy*dt; }
                get alive() { return this.life>0; }
                draw(ctx) { const a=Math.min(0.65,this.life*0.12); ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); const g=ctx.createRadialGradient(this.x,this.y,this.radius*0.25,this.x,this.y,this.radius); g.addColorStop(0,'#555577'); g.addColorStop(0.7,'#222244'); g.addColorStop(1,'#111122'); ctx.fillStyle=g; ctx.globalAlpha=a; ctx.fill(); ctx.strokeStyle='#8888aa'; ctx.lineWidth=2.5; ctx.stroke(); ctx.globalAlpha=1; }
            }

            // ────────────────────────────────────────
            // INICIALIZACIÓN DE ELEMENTOS
            // ────────────────────────────────────────
            function createStars() { stars=[]; const c=Math.floor((canvasW*canvasH)/2200); for(let i=0;i<c;i++) stars.push({x:Math.random()*canvasW,y:Math.random()*canvasH,r:Math.random()*1.9+0.3,twinkle:Math.random()*Math.PI*2,twinkleSpeed:0.35+Math.random()*2.5,baseAlpha:0.2+Math.random()*0.7}); }
            
            function setupPlayers() {
                const d1=SHIP_DEFS[equippedShipP1]||SHIP_DEFS['basic'], d2=SHIP_DEFS[equippedShipP2]||SHIP_DEFS['basic'];
                if(isLandscape) { player1=new Player(1,canvasW*0.07,canvasH/2,d1); player2=new Player(2,canvasW*0.93,canvasH/2,d2); }
                else { player1=new Player(1,canvasW/2,canvasH*0.07,d1); player2=new Player(2,canvasW/2,canvasH*0.93,d2); }
                
                player1.reset(); player2.reset();
                projectiles=[]; particles=[]; powerUps=[]; obstacles=[]; floatingTexts=[];
                shakeAmount=0; winnerPlayer=null; gameOverTimer=0; cameraZoom=1; isWarping=false;

                if(gameMode==='survival') {
                    currentWave = 1;
                    survivalHearts = 3;
                    enemiesLeftToKill = 10;
                    currentBgIndex = Math.floor(Math.random() * BACKGROUNDS.length);
                }
                powerUpTimer=performance.now()+2500; obstacleTimer=performance.now()+3000;
            }

            function resizeCanvas() {

            // ────────────────────────────────────────
            // ENTRADA TÁCTIL (MÓVIL)
            // ────────────────────────────────────────
            function getTouchSide(tx,ty) { return isLandscape?(tx<canvasW/2?'left':'right'):(ty<canvasH/2?'top':'bottom'); }
            canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); initAudio(); if(gameState==='playing'&&!isWarping){ for(const t of e.changedTouches){ const side=getTouchSide(t.clientX,t.clientY); activeTouches[t.identifier]={x:t.clientX,y:t.clientY,side}; const tg=(side==='left'||side==='top')?player1:player2; if(tg) tg.isTouching=true; if(tg&&isLandscape) tg.targetY=Math.max(tg.height/2,Math.min(canvasH-tg.height/2,t.clientY)); if(tg&&!isLandscape) tg.targetX=Math.max(tg.width/2,Math.min(canvasW-tg.width/2,t.clientX)); } } },{passive:false});
            canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); if(gameState!=='playing'||isWarping) return; for(const t of e.changedTouches){ if(activeTouches[t.identifier]){ activeTouches[t.identifier].x=t.clientX; activeTouches[t.identifier].y=t.clientY; const side=activeTouches[t.identifier].side; const tg=(side==='left'||side==='top')?player1:player2; if(tg&&isLandscape) tg.targetY=Math.max(tg.height/2,Math.min(canvasH-tg.height/2,t.clientY)); if(tg&&!isLandscape) tg.targetX=Math.max(tg.width/2,Math.min(canvasW-tg.width/2,t.clientX)); } } },{passive:false});
            canvas.addEventListener('touchend',(e)=>{ e.preventDefault(); for(const t of e.changedTouches){ if(activeTouches[t.identifier]){ const side=activeTouches[t.identifier].side; const tg=(side==='left'||side==='top')?player1:player2; if(tg) tg.isTouching=false; delete activeTouches[t.identifier]; } } for(const p of [player1,player2]){ if(!p) continue; const side=p.id===1?(isLandscape?'left':'top'):(isLandscape?'right':'bottom'); if(!Object.values(activeTouches).some(t=>t.side===side)) p.isTouching=false; } },{passive:false});

            // ────────────────────────────────────────
            // LÓGICA DE SPAWN
            // ────────────────────────────────────────
            function spawnPowerUp() { const types=['rapid','triple','shield']; const type=types[Math.floor(Math.random()*types.length)]; let px,py,attempts=0; do { if(isLandscape){px=canvasW*0.25+Math.random()*canvasW*0.5;py=canvasH*0.12+Math.random()*canvasH*0.76;} else {px=canvasW*0.12+Math.random()*canvasW*0.76;py=canvasH*0.25+Math.random()*canvasH*0.5;} attempts++; } while(attempts<15 && obstacles.some(o=>Math.hypot(px-o.x,py-o.y)<o.radius+35)); powerUps.push(new PowerUp(px,py,type)); }
            
            function spawnObstacle() {
                let ox, oy, r, vx=0, vy=0;
                r = gameMode==='survival' ? 20+Math.random()*24 : 30+Math.random()*50;
                
                if(gameMode === 'survival') {
                    // Brotan del centro hacia los lados
                    if(isLandscape) {
                        ox = canvasW / 2; oy = canvasH*0.1 + Math.random()*canvasH*0.8;
                        vx = (Math.random() > 0.5 ? 1 : -1) * (160 + Math.random()*150 + currentWave * 12);
                        vy = (Math.random() - 0.5) * 60;
                    } else {
                        ox = canvasW*0.1 + Math.random()*canvasW*0.8; oy = canvasH / 2;
                        vx = (Math.random() - 0.5) * 60;
                        vy = (Math.random() > 0.5 ? 1 : -1) * (160 + Math.random()*150 + currentWave * 12);
                    }
                } else {
                    if(isLandscape){ox=canvasW*0.32+Math.random()*canvasW*0.36;oy=canvasH*0.08+Math.random()*canvasH*0.84;} 
                    else {ox=canvasW*0.08+Math.random()*canvasW*0.84;oy=canvasH*0.32+Math.random()*canvasH*0.36;}
                }
                obstacles.push(new Obstacle(ox,oy,r,vx,vy));
            }

            function spawnExplosion(x,y,color,count=18) { cinematicFlash = 0.14; for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2,s=90+Math.random()*450; particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,0.35+Math.random()*0.7)); } }

            function playerShoot(player) {
                if(!player.alive || !player.isTouching) return; const now=performance.now(); if(now-player.shootCooldown<player.getShootCooldown()) return; player.shootCooldown=now;
                const color=player.color; const speed=(isLandscape?canvasW:canvasH)*0.82; const count=player.getProjectileCount(); const isSniper=player.shipDef.id==='sniper'; const offsets=count===3?[-13,0,13]:[0];
                for(const off of offsets){ let px,py,vx,vy; if(isLandscape){px=player.x+(player.id===1?player.width/2:-player.width/2);py=player.y+off;vx=(player.id===1?1:-1)*speed;vy=0;} else {px=player.x+off;py=player.y+(player.id===1?player.height/2:-player.height/2);vx=0;vy=(player.id===1?1:-1)*speed;} projectiles.push(new Projectile(px,py,vx,vy,player.id,color,isSniper)); } sfxShoot();
            }

            function runWarpDrive() {
                isWarping = true; warpTimer = WARP_DURATION; projectiles=[]; obstacles=[]; powerUps=[]; cinematicFlash=0.35; sfxWin();
            }

            // ────────────────────────────────────────
            // BUCLE DE ACTUALIZACIÓN (UPDATE)
            // ────────────────────────────────────────
            function update(dt) {
                if(gameState!=='playing'){ if(gameState==='gameover'){gameOverTimer+=dt; if(gameOverTimer>1.6&&!document.querySelector('.menu-panel')) showGameOver(); } return; }
                const cappedDt=Math.min(dt,0.1); if(cinematicFlash>0) cinematicFlash-=cappedDt;

                // --- PROCESAMIENTO HIPERESPACIAL (CHICKEN INVADERS EFFECT) ---
                if(isWarping) {
                    warpTimer -= cappedDt;
                    for(const s of stars) {
                        const factor = 2400 * cappedDt * (s.r * 0.4 + 0.6);
                        if(isLandscape) { s.x -= factor; if(s.x<0) s.x=canvasW; } 
                        else { s.y -= factor; if(s.y<0) s.y=canvasH; }
                    }
                    cameraZoom = 1.0 + Math.sin((warpTimer / WARP_DURATION) * Math.PI) * 0.28;
                    if(warpTimer <= 0) {
                        isWarping = false; cameraZoom = 1; currentWave++;
                        enemiesLeftToKill = 10 + currentWave * 4;
                        currentBgIndex = (currentBgIndex + 1) % BACKGROUNDS.length; // Cambio a otro fondo bello
                        currencyP1 += 45 + currentWave * 10; currencyP2 += 45 + currentWave * 10; saveData();
                        powerUpTimer = performance.now() + 1500; obstacleTimer = performance.now() + 2000;
                    }
                    return; 
                }

                // --- CAPTURA DE TECLADO PC ---
                const pcSpd = 500 * cappedDt;
                if(isLandscape) {
                    if(keys['KeyW']) player1.targetY = Math.max(player1.height/2, player1.targetY - pcSpd);
                    if(keys['KeyS']) player1.targetY = Math.min(canvasH - player1.height/2, player1.targetY + pcSpd);
                    if(keys['ArrowUp']) player2.targetY = Math.max(player2.height/2, player2.targetY - pcSpd);
                    if(keys['ArrowDown']) player2.targetY = Math.min(canvasH - player2.height/2, player2.targetY + pcSpd);
                } else {
                    if(keys['KeyA']) player1.targetX = Math.max(player1.width/2, player1.targetX - pcSpd);
                    if(keys['KeyD']) player1.targetX = Math.min(canvasW - player1.width/2, player1.targetX + pcSpd);
                    if(keys['ArrowLeft']) player2.targetX = Math.max(player2.width/2, player2.targetX - pcSpd);
                    if(keys['ArrowRight']) player2.targetX = Math.min(canvasW - player2.width/2, player2.targetX + pcSpd);
                }
                player1.isTouching = keys['Space'] || Object.values(activeTouches).some(t=>t.side==='left'||t.side==='top');
                player2.isTouching = keys['Enter'] || keys['ControlRight'] || keys['ShiftRight'] || Object.values(activeTouches).some(t=>t.side==='right'||t.side==='bottom');

                // Movimiento físico suave
                for (const p of [player1,player2]) { if(p.hitFlash>0) p.hitFlash-=cappedDt; p.updateBuff(cappedDt); }
                for (const p of [player1,player2]) {
                    const spd=(isLandscape?canvasH:canvasW)*p.getSpeed()*cappedDt;
                    if(isLandscape){ const d=p.targetY-p.y; if(Math.abs(d)<spd) p.y=p.targetY; else p.y+=Math.sign(d)*spd; p.y=Math.max(p.height/2,Math.min(canvasH-p.height/2,p.y)); }
                    else { const d=p.targetX-p.x; if(Math.abs(d)<spd) p.x=p.targetX; else p.x+=Math.sign(d)*spd; p.x=Math.max(p.width/2,Math.min(canvasW-p.width/2,p.x)); }
                }

                playerShoot(player1); playerShoot(player2);
                for(const proj of projectiles) proj.update(cappedDt);

                // Colisión de proyectiles vs obstáculos
                for(const proj of projectiles) {
                    if(!proj.alive) continue;
                    for(const obs of obstacles){
                        if(Math.hypot(proj.x-obs.x,proj.y-obs.y)<obs.radius+proj.radius){
                            proj.alive=false;
                            if(gameMode === 'survival') {
                                obs.life = 0; spawnExplosion(obs.x,obs.y,'#ffd400',12);
                                enemiesLeftToKill--; const sc = proj.ownerId===1?player1:player2; sc.score++;
                                if(enemiesLeftToKill <= 0) { runWarpDrive(); return; }
                            } else {
                                spawnExplosion(proj.x,proj.y,'#ffffff',4);
                            }
                            break;
                        }
                    }
                }

// Colisiones en Modo 1vs1 Clásico
                if(gameMode === '1vs1') {
                    for(const proj of projectiles) {
                        if(!proj.alive) continue; const target=proj.ownerId===1?player2:player1;
                        if(Math.hypot(proj.x-target.x,proj.y-target.y)<Math.max(target.width,target.height)*0.55+proj.radius){
                            proj.alive=false; const hitReal=target.handleHit();
                            if(hitReal){
                                const attacker=proj.ownerId===1?player1:player2; attacker.score++; spawnExplosion(proj.x,proj.y,proj.color,22); shakeAmount=8; cameraZoom=1.06; sfxHit(); vibrate([30,50,30]);
                                if(attacker.score>=10){
                                    gameState='gameover'; winnerPlayer=attacker; gameOverTimer=0; sfxWin(); vibrate([100,80,100,80,200]);
                                    if(attacker.id===1) { currencyP1+=100; livesP2--; if(livesP2<=0){ currencyP2=0; unlockedShipsP2=new Set(['basic']); equippedShipP2='basic'; livesP2=3; } } 
                                    else { currencyP2+=100; livesP1--; if(livesP1<=0){ currencyP1=0; unlockedShipsP1=new Set(['basic']); equippedShipP1='basic'; livesP1=3; } }
                                    saveData();
                                }
                            } else { spawnExplosion(proj.x,proj.y,'rgb(100,255,150)',5); vibrate(12); }
                        }
                    }
                } else {
                    // Colisiones de Obstáculos contra Jugadores en Supervivencia
                    for(const obs of obstacles) {
                        if(!obs.alive) continue;
                        for(const target of [player1, player2]) {
                            if(!target.alive) continue;
                            if(Math.hypot(obs.x-target.x, obs.y-target.y) < Math.max(target.width,target.height)*0.55 + obs.radius) {
                                obs.alive = false; spawnExplosion(obs.x, obs.y, '#ff3333', 16);
                                const realHit = target.handleHit();
                                if(realHit) {
                                    shakeAmount=12; cameraZoom=1.08; sfxHit(); vibrate([50,40,50]);
                                    survivalHearts--; floatingTexts.push(new FloatingText(target.x, target.y - 30, "-1 ❤️", "#ff3333", 1.4));
                                    if(survivalHearts <= 0) {
                                        gameState='gameover'; gameOverTimer=0;
                                        currencyP1=0; unlockedShipsP1=new Set(['basic']); equippedShipP1='basic';
                                        currencyP2=0; unlockedShipsP2=new Set(['basic']); equippedShipP2='basic';
                                        saveData();
                                    }
                                }
                            }
                        }
                    }
                }

                projectiles=projectiles.filter(p=>p.alive);
                for(const p of particles) p.update(cappedDt); particles=particles.filter(p=>p.alive);
                for(const ft of floatingTexts) ft.update(cappedDt); floatingTexts=floatingTexts.filter(f=>f.alive);

                const now=performance.now();
                if(now>powerUpTimer && powerUps.filter(p=>p.alive&&!p.collected).length<2) { spawnPowerUp(); powerUpTimer=now+5000+Math.random()*6000; }
                for(const pu of powerUps) pu.update(cappedDt);

                // Colisión e impacto de proyectiles para activar Power-Ups
                for (const pu of powerUps) {
                    if (!pu.alive || pu.collected) continue;
                    for (const proj of projectiles) {
                        if (!proj.alive) continue;
                        if (Math.hypot(pu.x - proj.x, pu.y - proj.y) < pu.radius + proj.radius) {
                            const player = proj.ownerId === 1 ? player1 : player2;
                            player.applyBuff(pu.type); pu.collected = true; pu.life = 0; proj.alive = false;
                            spawnExplosion(pu.x, pu.y, pu.color, 20);
                            floatingTexts.push(new FloatingText(pu.x, pu.y - 20, `J${player.id} ${pu.label}!`, pu.color, 1.2));
                            sfxPowerUp(); vibrate(35); break;
                        }
                    }
                }
                powerUps=powerUps.filter(p=>p.alive);

                const spawnCap = gameMode === 'survival' ? 5 : 3;
                if(now>obstacleTimer && obstacles.length<spawnCap) { spawnObstacle(); obstacleTimer=now+(gameMode==='survival'?(1100-Math.min(550,currentWave*50)):(7000+Math.random()*9000)); }
                for(const obs of obstacles) obs.update(cappedDt); obstacles=obstacles.filter(o=>o.alive);
                
                if(shakeAmount>0) shakeAmount*=Math.exp(-cappedDt*7); if(shakeAmount<0.04) shakeAmount=0; cameraZoom += (1-cameraZoom)*cappedDt*4;
            }
// ────────────────────────────────────────
            // PROCESO DE RENDERIZADO (DRAW)
            // ────────────────────────────────────────
            function drawBackground() {
                const conf = BACKGROUNDS[currentBgIndex] || BACKGROUNDS[0];
                const bg=ctx.createRadialGradient(canvasW/2,canvasH/2,0,canvasW/2,canvasH/2,Math.max(canvasW,canvasH)*0.7); bg.addColorStop(0,conf.deep); bg.addColorStop(1,conf.dark); ctx.fillStyle=bg; ctx.fillRect(0,0,canvasW,canvasH);
                
                const t=Date.now()*0.001; 
                for(const s of stars){
                    if(isWarping) {
                        // Estrellas estiradas de forma cinética
                        ctx.beginPath(); ctx.strokeStyle = `rgba(255,255,255,${s.baseAlpha*1.4})`; ctx.lineWidth = s.r * 1.5;
                        if(isLandscape) { ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + s.r * 45, s.y); } 
                        else { ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y + s.r * 45); }
                        ctx.stroke();
                    } else {
                        const a=s.baseAlpha+Math.sin(t*s.twinkleSpeed+s.twinkle)*0.3; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${Math.max(0.06,a)})`; ctx.fill();
                    }
                }
                if(gameMode === '1vs1') {
                    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; ctx.setLineDash([8,18]); ctx.beginPath(); if(isLandscape){ctx.moveTo(canvasW/2,0);ctx.lineTo(canvasW/2,canvasH);}else{ctx.moveTo(0,canvasH/2);ctx.lineTo(canvasW,canvasH/2);} ctx.stroke(); ctx.setLineDash([]);
                }
            }

            function drawUI() {
                const fs=Math.min(canvasW,canvasH)*0.048; ctx.font=`bold ${fs}px 'Segoe UI',sans-serif`; ctx.textBaseline='top';
                
                if(gameMode === '1vs1') {
                    ctx.textAlign='center';
                    ctx.fillStyle=player1.color; ctx.shadowColor=player1.glowColor; ctx.shadowBlur=10; ctx.fillText(`J1: ${player1.score} (${'❤️'.repeat(livesP1)})`,isLandscape?canvasW*0.22:canvasW/2,isLandscape?20:26);
                    ctx.fillStyle=player2.color; ctx.shadowColor=player2.glowColor; ctx.fillText(`J2: ${player2.score} (${'❤️'.repeat(livesP2)})`,isLandscape?canvasW*0.78:canvasW/2,isLandscape?20:canvasH-26-fs);
                    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(canvasW*0.1,65,canvasW*0.3,8); ctx.fillRect(canvasW*0.6,65,canvasW*0.3,8);
                    ctx.fillStyle=player1.color; ctx.fillRect(canvasW*0.1,65,(player1.score/10)*(canvasW*0.3),8);
                    ctx.fillStyle=player2.color; ctx.fillRect(canvasW*0.6,65,(player2.score/10)*(canvasW*0.3),8);
                } else {
                    ctx.textAlign='center'; ctx.fillStyle='#ffffff'; ctx.shadowBlur=8; ctx.shadowColor='#00d4ff';
                    ctx.fillText(`OLEADA ${currentWave}   |   ${'❤️'.repeat(survivalHearts)}`, canvasW / 2, 18);
                    ctx.fillStyle='#ffd700'; ctx.font=`bold ${fs*0.8}px sans-serif`; ctx.fillText(`Objetivos: ${Math.max(0, enemiesLeftToKill)}`, canvasW / 2, 22 + fs);
                    
                    ctx.font=`600 ${fs*0.75}px sans-serif`; ctx.textAlign='left'; ctx.fillStyle=player1.color; ctx.fillText(`J1 Kills: ${player1.score}`, 20, 18);
                    ctx.textAlign='right'; ctx.fillStyle=player2.color; ctx.fillText(`J2 Kills: ${player2.score}`, canvasW - 20, 18);
                }
                ctx.shadowBlur=0;
            }

            function render() {
                ctx.clearRect(0,0,canvasW,canvasH); let sx=0,sy=0; if(shakeAmount>0.08){sx=(Math.random()-0.5)*shakeAmount*2;sy=(Math.random()-0.5)*shakeAmount*2;} ctx.save(); ctx.translate(canvasW/2,canvasH/2); ctx.scale(cameraZoom,cameraZoom); ctx.translate(-canvasW/2+sx,-canvasH/2+sy);
                
                const conf = BACKGROUNDS[currentBgIndex] || BACKGROUNDS[0];
                const neb=ctx.createRadialGradient(canvasW*0.5,canvasH*0.5,0,canvasW*0.5,canvasH*0.5,canvasW*0.7); neb.addColorStop(0,conf.neb1); neb.addColorStop(0.5,conf.neb2); neb.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=neb; ctx.fillRect(0,0,canvasW,canvasH);
                
                drawBackground(); for(const o of obstacles) o.draw(ctx); for(const pu of powerUps) pu.draw(ctx); for(const p of particles) p.draw(ctx); for(const pr of projectiles) pr.draw(ctx);
                if(player1) player1.draw(ctx,isLandscape); if(player2) player2.draw(ctx,isLandscape);
                for(const ft of floatingTexts) ft.draw(ctx);
                ctx.restore();
                
                if(gameState==='playing') drawUI();
                
                // Pantalla cinemática intergaláctica (Warp text overlay)
                if(isWarping) {
                    ctx.fillStyle = 'rgba(0, 0, 5, 0.35)'; ctx.fillRect(0,0,canvasW,canvasH);
                    ctx.font = "bold 34px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = "#00f0ff"; ctx.shadowColor = "#00f0ff"; ctx.shadowBlur = 20;
                    ctx.fillText("¡OLEADA COMPLETADA!", canvasW / 2, canvasH / 2 - 25);
                    ctx.font = "italic 18px sans-serif"; ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 0;
                    ctx.fillText("Viajando al siguiente sector de la galaxia...", canvasW / 2, canvasH / 2 + 20);
                }

                if(cinematicFlash>0){ ctx.fillStyle=`rgba(255,255,255,${cinematicFlash})`; ctx.fillRect(0,0,canvasW,canvasH); }
                
                if(gameState==='gameover') { 
                    drawUI(); ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,canvasW,canvasH); 
                    const fs=Math.min(canvasW,canvasH)*0.08; ctx.font=`bold ${fs}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; 
                    if(gameMode==='1vs1' && winnerPlayer) {
                        ctx.fillStyle=winnerPlayer.id===1?'#00d4ff':'#ff3860'; ctx.shadowBlur=25; ctx.fillText(`¡J${winnerPlayer.id} Gana!`,canvasW/2,canvasH/2);
                    } else {
                        ctx.fillStyle='#ef4444'; ctx.shadowBlur=25; ctx.fillText("¡ESCUDO DESTRUIDO!",canvasW/2,canvasH/2);
                    }
                    ctx.shadowBlur=0; 
                }
            }

            let lastTime=performance.now();
            function gameLoop(ts) { let dt=(ts-lastTime)/1000; if(dt<=0) dt=0.016; if(dt>0.2) dt=0.2; lastTime=ts; const w=window.innerWidth,h=window.innerHeight; if((w>h)!==isLandscape){ isLandscape=w>h; resizeCanvas(); if(gameState==='playing'&&!isWarping) setupPlayers(); } update(dt); render(); requestAnimationFrame(gameLoop); }
            
            function init() { loadData(); resizeCanvas(); gameState='menu'; showMenu(); lastTime=performance.now(); requestAnimationFrame(gameLoop); }
            window.addEventListener('resize',()=>{ resizeCanvas(); if(gameState==='playing'&&!isWarping) setupPlayers(); });
            document.addEventListener('gesturestart',e=>e.preventDefault());
            init();
        })();
    </script>
</body>
